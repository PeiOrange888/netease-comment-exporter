<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>云评导出 · 网易云评论工作台</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <a class="brand" href="/" aria-label="云评导出首页">
          <span class="brand-mark" aria-hidden="true"><img src="/icons/message-circle.svg" alt=""></span>
          <span class="brand-copy">
            <span class="brand-name">云评导出</span>
            <span class="brand-caption">NetEase comment workspace</span>
          </span>
        </a>
        <div class="header-meta">
          <span class="local-status"><span class="status-dot" aria-hidden="true"></span>本地服务运行中</span>
          <span class="header-divider" aria-hidden="true"></span>
          <span class="header-note">只处理公开评论</span>
        </div>
      </div>
    </header>

    <main class="app-main">
      <section class="intro-row" aria-labelledby="page-heading">
        <div>
          <p class="kicker">COMMENT EXPORTER / 01</p>
          <h1 id="page-heading">把一首歌的评论，整理成可用的数据。</h1>
          <p class="intro-copy">网易云音乐公开评论 · Local-first workspace</p>
        </div>
        <div class="privacy-note"><span class="privacy-icon"><img src="/icons/shield-check.svg" alt=""></span><span>数据仅保存在当前进程</span></div>
      </section>

      <section class="workspace" aria-labelledby="source-heading">
        <div class="workspace-main">
          <div class="section-label"><span class="step-number">01</span><div><p class="section-kicker">SOURCE</p><h2 id="source-heading">选择歌曲</h2></div></div>
          <form id="song-form" class="song-form">
            <label class="field field-grow" for="song-input">
              <span>歌曲链接或 ID</span>
              <span class="input-wrap"><img src="/icons/link-2.svg" alt=""><input id="song-input" name="song" type="text" autocomplete="off" placeholder="粘贴 music.163.com 链接或输入数字 ID" required></span>
            </label>
            <button id="lookup-button" class="button button-secondary" type="submit"><img src="/icons/search.svg" alt=""><span>读取歌曲</span></button>
          </form>

          <div class="collection-controls">
            <fieldset class="sort-fieldset">
              <legend>评论排序</legend>
              <div class="segmented-control">
                <label><input type="radio" name="sort" value="recommended" checked><span><img src="/icons/sparkles.svg" alt="">推荐</span></label>
                <label><input type="radio" name="sort" value="hot"><span><img src="/icons/flame.svg" alt="">热门</span></label>
                <label><input type="radio" name="sort" value="newest"><span><img src="/icons/clock-3.svg" alt="">最新</span></label>
              </div>
            </fieldset>
            <label class="field count-field" for="count-input"><span>采集数量</span><span class="count-wrap"><input id="count-input" type="number" min="1" max="5000" step="20" value="200"><span>条</span></span></label>
            <button id="start-button" class="button button-primary" type="button" disabled><img src="/icons/play.svg" alt=""><span>开始采集</span></button>
          </div>
        </div>

        <article id="song-summary" class="song-summary" aria-live="polite">
          <div class="cover-shell"><img id="song-cover" class="song-cover" alt="" hidden><img id="cover-placeholder" class="cover-placeholder" src="/icons/music-2.svg" alt=""></div>
          <div class="song-copy"><span id="song-state" class="eyebrow">等待读取歌曲</span><h2 id="song-title">尚未选择歌曲</h2><p id="song-artist">-</p><p id="song-album" class="song-album">-</p></div>
          <span class="summary-arrow" aria-hidden="true"><img src="/icons/arrow-down-left.svg" alt=""></span>
        </article>
      </section>

      <section class="task-band" aria-labelledby="task-heading">
        <div class="task-heading-row">
          <div class="section-label"><span class="step-number">02</span><div><p class="section-kicker">RUN</p><h2 id="task-heading">采集任务</h2><p id="task-meta">暂无任务</p></div></div>
          <div class="task-actions"><button id="cancel-button" class="icon-button" type="button" title="取消采集" hidden><img src="/icons/square.svg" alt=""></button><button id="csv-button" class="button button-export" type="button" hidden><img src="/icons/file-spreadsheet.svg" alt=""><span>导出 CSV</span></button><button id="json-button" class="button button-export" type="button" hidden><img src="/icons/file-json.svg" alt=""><span>导出 JSON</span></button></div>
        </div>
        <div class="progress-track" aria-hidden="true"><div id="progress-bar" class="progress-bar"></div></div>
        <div id="task-status" class="task-status" role="status"><span class="status-icon"><img src="/icons/inbox.svg" alt=""></span><span>等待新任务</span></div>
      </section>

      <section class="results-band" aria-labelledby="results-heading">
        <div class="results-heading-row"><div class="section-label"><span class="step-number">03</span><div><p class="section-kicker">OUTPUT</p><h2 id="results-heading">评论结果</h2></div></div><span id="result-count" class="result-count">0 条</span></div>
        <div class="table-shell"><table><thead><tr><th scope="col">评论内容</th><th scope="col">用户</th><th scope="col">点赞</th><th scope="col">时间</th></tr></thead><tbody id="comments-body"><tr class="empty-row"><td colspan="4"><span class="empty-icon"><img src="/icons/message-square-dashed.svg" alt=""></span><span>暂无评论数据</span></td></tr></tbody></table></div>
      </section>
    </main>

    <footer class="app-footer"><span>云评导出 · 本地运行</span><span>公开评论 · CSV / JSON</span></footer>
    <div id="toast" class="toast" role="alert" hidden></div>
    <script src="/app.js"></script>
  </body>
</html>
